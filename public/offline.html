<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Offline — The Budo League</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D5C63;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .logo {
      height: 64px;
      width: auto;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      padding: 10px 24px;
      background: #fff;
      color: #0D5C63;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/icon-t.png" alt="The Budo League" class="logo" />
    <div class="icon">&#128247;</div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again. Your data is safe — we'll be right back.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
